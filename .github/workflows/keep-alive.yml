name: Keep Supabase Alive

on:
  schedule:
    # Berjalan otomatis setiap hari ke-3 dan ke-6 setiap minggu jam 00:00 UTC
    - cron: '0 0 * * 3,6'
  workflow_dispatch: # Membuat tombol manual di GitHub untuk tes ping

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping to Supabase REST API
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
